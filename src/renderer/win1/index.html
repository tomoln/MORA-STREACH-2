<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>Mora Streach</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: #1a1a2e;
      font-family: sans-serif;
      color: #e0e0e0;
      user-select: none;
    }
    h1 {
      font-size: 2.8rem;
      letter-spacing: 0.1em;
      margin-bottom: 48px;
    }
    #drop-zone {
      width: 480px;
      min-height: 140px;
      border: 2px dashed #555;
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 24px;
      transition: border-color 0.2s, background 0.2s;
    }
    #drop-zone.over {
      border-color: #7c9eff;
      background: rgba(124, 158, 255, 0.08);
    }
    #drop-zone .hint {
      font-size: 0.9rem;
      color: #777;
    }
    #file-info {
      display: none;
      width: 100%;
      background: #16213e;
      border-radius: 8px;
      padding: 16px 20px;
      gap: 6px;
      flex-direction: column;
    }
    #file-info.visible { display: flex; }
    #file-info .badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: bold;
      letter-spacing: 0.05em;
      margin-bottom: 4px;
    }
    #file-info .badge.audio { background: #3a6bc4; color: #cce0ff; }
    #file-info .badge.json  { background: #3a9c5c; color: #c3f0d4; }
    #file-info .file-name {
      font-size: 1.1rem;
      font-weight: bold;
      word-break: break-all;
    }
    #file-info .file-path {
      font-size: 0.78rem;
      color: #888;
      word-break: break-all;
    }
    #file-info .ok-mark {
      font-size: 1.3rem;
      color: #6cf0a0;
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <h1>Mora Streach</h1>

  <div id="drop-zone">
    <span class="hint">win2 からファイルをドロップ</span>
    <div id="file-info">
      <span id="badge" class="badge"></span>
      <span id="file-name" class="file-name"></span>
      <span id="file-path" class="file-path"></span>
      <span class="ok-mark">✔ 読み込み OK</span>
    </div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
