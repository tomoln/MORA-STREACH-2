<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>Waveform</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d0d1a;
      display: flex;
      flex-direction: column;
      height: 100vh;
      font-family: sans-serif;
      color: #ccc;
      overflow: hidden;
      transition: background 0.2s;
    }
    body.add-slice-mode {
      background: #2a0808;
    }

    /* ── ヘッダー ── */
    #header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 16px;
      border-bottom: 1px solid #1e1e35;
      flex-shrink: 0;
    }
    #file-name  { font-size: 0.82rem; color: #7aabff; font-weight: bold; }
    #meta-info  { font-size: 0.72rem; color: #555; margin-left: auto; white-space: nowrap; }

    /* ── プレースホルダー ── */
    #placeholder {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #2e2e4a;
      font-size: 0.82rem;
      letter-spacing: 0.06em;
    }

    /* ── 波形セクション ── */
    #waveform-section {
      display: none;
      flex-direction: column;
      flex: 1;
      overflow: hidden;
    }
    #waveform-section.visible { display: flex; }

    #canvas-wrap {
      flex: 1;
      padding: 12px 18px 8px;
      min-height: 0;
    }
    canvas { width: 100%; height: 100%; display: block; border-radius: 4px; }

    /* ── スクロールバー ── */
    #scroll-row {
      padding: 0 16px 4px;
      display: none;
    }
    #scroll-row.visible { display: block; }
    #scroll-slider { width: 100%; accent-color: #4a6ea8; cursor: pointer; }

    /* ── ズームコントロール ── */
    #zoom-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 16px 10px;
      flex-shrink: 0;
      border-top: 1px solid #1a1a2e;
    }
    .zoom-label { font-size: 0.72rem; color: #555; white-space: nowrap; }
    #zoom-slider {
      flex: 1;
      accent-color: #3d7edb;
      cursor: pointer;
    }
    #zoom-value {
      font-size: 0.78rem;
      color: #7aabff;
      min-width: 56px;
      text-align: right;
      font-variant-numeric: tabular-nums;
    }
    #visible-range {
      font-size: 0.68rem;
      color: #444;
      min-width: 120px;
      text-align: right;
      font-variant-numeric: tabular-nums;
    }
  </style>
</head>
<body>
  <div id="header">
    <span id="file-name">—</span>
    <span id="meta-info"></span>
  </div>

  <div id="placeholder">win1 にオーディオをドロップすると波形を表示します</div>

  <div id="waveform-section">
    <div id="canvas-wrap">
      <canvas id="waveform"></canvas>
    </div>

    <div id="scroll-row">
      <input type="range" id="scroll-slider" min="0" max="10000" value="0" step="1" />
    </div>

    <div id="zoom-row">
      <span class="zoom-label">ズーム</span>
      <input type="range" id="zoom-slider" min="0" max="1000" value="0" step="1" />
      <span id="zoom-value">×1.0</span>
      <span id="visible-range"></span>
    </div>
  </div>

  <script type="module">
    import { SoundTouch } from '../../../node_modules/soundtouchjs/dist/soundtouch.js';
    window._SoundTouch = SoundTouch;
  </script>
  <script src="renderer.js"></script>
</body>
</html>
