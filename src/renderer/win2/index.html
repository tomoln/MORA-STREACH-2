<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>Assets Browser</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #12121f;
      font-family: sans-serif;
      color: #d0d0d0;
      padding: 20px 16px;
      user-select: none;
    }
    h2 {
      font-size: 1rem;
      color: #888;
      letter-spacing: 0.08em;
      margin-bottom: 16px;
      text-transform: uppercase;
    }
    .section-label {
      font-size: 0.7rem;
      color: #555;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin: 16px 0 6px;
    }
    .file-list {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .file-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      border-radius: 6px;
      cursor: grab;
      border: 1px solid transparent;
      transition: background 0.15s;
    }
    .file-item:hover { background: #1e1e35; border-color: #333; }
    .file-item:active { cursor: grabbing; }
    .file-item .icon { font-size: 1.1rem; }
    .file-item .name { font-size: 0.9rem; }
    .file-item[data-type="audio"] .icon { color: #7aabff; }
    .file-item[data-type="json"]  .icon { color: #6dd98c; }
    .drag-hint {
      margin-top: 24px;
      font-size: 0.75rem;
      color: #444;
      text-align: center;
    }
  </style>
</head>
<body>
  <h2>Assets Browser</h2>
  <div id="file-list" class="file-list"></div>
  <p class="drag-hint">アイテムをドラッグして win1 へ</p>

  <script src="renderer.js"></script>
</body>
</html>
